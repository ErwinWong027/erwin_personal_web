<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 背景圆形 -->
  <circle cx="50" cy="50" r="48" fill="#6B46C1"/>
  
  <!-- 外圈装饰 -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#9F7AEA" stroke-width="2"/>
  
  <!-- 魔法阵外环 -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#E9D8FD" stroke-width="1" opacity="0.6"/>
  
  <!-- 魔法阵内环 -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="#E9D8FD" stroke-width="1" opacity="0.8"/>
  
  <!-- 中心宝石 -->
  <polygon points="50,32 62,44 62,56 50,68 38,56 38,44" fill="#F6E05E" stroke="#D69E2E" stroke-width="1.5"/>
  
  <!-- 宝石高光 -->
  <polygon points="50,36 58,44 58,54 50,62 42,54 42,44" fill="#FAF089" opacity="0.7"/>
  
  <!-- 魔法符文线条 -->
  <line x1="50" y1="12" x2="50" y2="24" stroke="#E9D8FD" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="76" x2="50" y2="88" stroke="#E9D8FD" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="50" x2="24" y2="50" stroke="#E9D8FD" stroke-width="2" stroke-linecap="round"/>
  <line x1="76" y1="50" x2="88" y2="50" stroke="#E9D8FD" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 对角线符文 -->
  <line x1="22" y1="22" x2="30" y2="30" stroke="#E9D8FD" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="78" y1="22" x2="70" y2="30" stroke="#E9D8FD" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="22" y1="78" x2="30" y2="70" stroke="#E9D8FD" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="78" y1="78" x2="70" y2="70" stroke="#E9D8FD" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  
  <!-- 旋转的魔法符号 -->
  <path d="M50 18 L54 26 L50 30 L46 26 Z" fill="#9F7AEA"/>
  <path d="M50 82 L54 74 L50 70 L46 74 Z" fill="#9F7AEA"/>
  <path d="M18 50 L26 54 L30 50 L26 46 Z" fill="#9F7AEA"/>
  <path d="M82 50 L74 54 L70 50 L74 46 Z" fill="#9F7AEA"/>
  
  <!-- 内圈装饰点 -->
  <circle cx="50" cy="22" r="2" fill="#F6E05E"/>
  <circle cx="50" cy="78" r="2" fill="#F6E05E"/>
  <circle cx="22" cy="50" r="2" fill="#F6E05E"/>
  <circle cx="78" cy="50" r="2" fill="#F6E05E"/>
</svg>